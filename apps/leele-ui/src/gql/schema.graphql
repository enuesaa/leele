schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

type Query {
  notes: [Note!]!
  note(id: ID!): Note
}

type Mutation {
  createNote(message: String!): Note!
}

type Subscription {
  onNoteCreated: Note @aws_subscribe(mutations: ["createNote"])
}

type Note {
  id: ID!
  message: String!
}
